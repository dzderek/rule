#官方文档https://wiki.metacubex.one/config/general/
#官方ymal配置https://github.com/MetaCubeX/mihomo/blob/Meta/docs/config.yaml


proxy-providers:
  Airport1:
    url: "机场订阅地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    override:
      client-fingerprint: chrome

# 节点信息
proxies:
  - {name: 直连, type: direct}
  
# 全局配置 
mixed-port: 7893
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true  #要求内核把你在面板上选中的节点（比如默认代理选了香港）存入 cache.db。
  store-fake-ip: true #要求内核把 Fake-IP 的解析记录存入 cache.db

# zashboard面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探(fakeip下其实可以不用嗅探)
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"

# 入站  
tun:
  enable: true
  stack: mixed   # system/gvisor/mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki,混入全部不修改的情况,开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块,官方文档地址https://wiki.metacubex.one/config/dns/#direct-nameserver
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  
  respect-rules: true  
  #是否遵循路由规则，本机和dns服务器之间的连接
  # 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
  # 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
  # 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
  # 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
  # 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
  
  # --- Fake-IP 基础配置 ---
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  
  default-nameserver:  #默认 DNS, 用于解析下面DNS 服务器的域名，必须为 IP, 可为加密 DNS
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:  #专用于节点域名解析的 DNS 服务器，非必要配置项，如果不填则遵循nameserver-policy、nameserver和fallback的配置
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver: #专用于direct出口域名解析的 DNS 服务器，非必要配置项，如果不填则遵循nameserver-policy、nameserver和fallback的配置
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver: #托底dns，最终流向
    - https://8.8.8.8/dns-query
    - https://cloudflare-dns.com/dns-query
  nameserver-policy: #配置查询域名使用的 DNS 服务器
    "rule-set:cn_domain,private_domain,apple_domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  fake-ip-filter:
    - rule-set:fakeipfilter_domain
    - rule-set:cn_domain
    - rule-set:private_domain
    - rule-set:apple_domain
    - +.miwifi.com
    - +.push.apple.com
    - '+.home-assistant.io'
    - 'checkonline.home-assistant.io'

 
###出站策略#########################################
proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 🔯 狮城故转, 🔯 香港故转, 🔯 日本故转, 🔯 美国故转, 直连]}
  - {name: ♾️ YouTube, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ Google, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ ChatGPT, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ GitHub, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ OneDrive, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: ♾️ Microsoft, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: ♾️ Telegram, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, 直连]}
  - {name: 🔯 香港故转, type: fallback, include-all: true, interval: 1800, filter: "(?=.*(香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 20, interval: 1800, filter: "(?=.*(香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, interval: 1800, filter: "(?=.*(日本|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 20, interval: 1800, filter: "(?=.*(日本|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: 🔯 狮城故转, type: fallback, include-all: true, interval: 1800, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"}
  - {name: ♻️ 狮城自动, type: url-test, include-all: true, tolerance: 20, interval: 1800, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美)).)*$"}
  - {name: 🔯 美国故转, type: fallback, include-all: true, interval: 1800, filter: "(?=.*(美国|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 20, interval: 1800, filter: "(?=.*(美国|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"} 
  #- {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 1800, filter: "^((?!(直连)).)*$"}
  #- {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?=.*(香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  #- {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?=.*(日本|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  #- {name: 🇸🇬 狮城节点, type: select, include-all: true, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"}
  #- {name: 🇺🇲 美国节点, type: select, include-all: true, filter: "(?=.*(美国|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"}
  #- {name: 🌐 全部节点, type: select, include-all: true} 注销掉只会就关闭了除了日本，香港，新加坡和美国之外的所有节点，只利用下面的就行
  - {name: 🌐 全部节点, type: select, include-all: true, filter: "(香港|HK|Hong|日本|JP|Japan|新加坡|SG|Singapore|美国|US|America|States)"}


########################规则匹配#######################
rules:
  - IP-CIDR,192.168.31.0/24,直连,no-resolve
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连
  #个人规则
  - RULE-SET,my_direct_domains,直连
  - RULE-SET,my_proxy_domains,🚀 默认代理
  - RULE-SET,my_reject_domains,REJECT

  #其余的规则
  - RULE-SET,proxylite,🚀 默认代理
  - RULE-SET,ai,♾️ ChatGPT
  - RULE-SET,github_domain,♾️ GitHub
  - RULE-SET,youtube_domain,♾️ YouTube
  - RULE-SET,google_domain,♾️ Google
  - RULE-SET,onedrive_domain,♾️ OneDrive
  - RULE-SET,microsoft_domain,♾️ Microsoft
  - RULE-SET,apple_domain,直连
  - RULE-SET,telegram_domain,♾️ Telegram
  - RULE-SET,apple_ip,直连
  - RULE-SET,google_ip,♾️ Google
  - RULE-SET,telegram_ip,♾️ Telegram
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  - MATCH,🐟 漏网之鱼


