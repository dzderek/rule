#官方文档https://wiki.metacubex.one/config/general/


proxy-providers:
  Airport1:
    url: "机场订阅地址"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    override:
      client-fingerprint: chrome

# 节点信息
proxies:
  - {name: 直连, type: direct}
  
# 全局配置 
mixed-port: 7893
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

#为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探(fakeip下其实可以不用嗅探)
sniffer:
  enable: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: false
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站  
tun:
  enable: true
  stack: mixed   # system/gvisor/mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki,混入全部不修改的情况,开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块,官方文档地址https://wiki.metacubex.one/config/dns/#direct-nameserver
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  default-nameserver:  #默认 DNS, 用于解析 DNS 服务器 的域名，必须为 IP, 可为加密 DNS
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:  #代理节点域名解析服务器，仅用于解析代理节点的域名
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver: #用于 direct 出口域名解析的 DNS 服务器
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver: #默认的域名解析服务器
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - rule-set:fakeipfilter_domain

 
###出站策略#########################################
proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 🔯 狮城故转, 🔯 香港故转, 🔯 日本故转, 🔯 美国故转, 直连]}
  - {name: ♾️ YouTube, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ Google, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ ChatGPT, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ GitHub, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: ♾️ OneDrive, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: ♾️ Microsoft, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: ♾️ Telegram, type: select, proxies: [🚀 默认代理, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 香港自动, ♻️ 美国自动, 直连]}
  - {name: 🐟 漏网之鱼, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: 🔯 香港故转, type: fallback, include-all: true, interval: 600, filter: "(?=.*(香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "(?=.*(香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, interval: 600, filter: "(?=.*(日本|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "(?=.*(日本|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: 🔯 狮城故转, type: fallback, include-all: true, interval: 600, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"}
  - {name: ♻️ 狮城自动, type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美)).)*$"}
  - {name: 🔯 美国故转, type: fallback, include-all: true, interval: 600, filter: "(?=.*(美国|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "(?=.*(美国|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"} 
  #- {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "^((?!(直连)).)*$"}
  #- {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?=.*(香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  #- {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?=.*(日本|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  #- {name: 🇸🇬 狮城节点, type: select, include-all: true, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"}
  #- {name: 🇺🇲 美国节点, type: select, include-all: true, filter: "(?=.*(美国|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"}
  - {name: 🌐 全部节点, type: select, include-all: true}


########################规则匹配#######################
rules:
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连
  #个人规则
  - RULE-SET,my_direct_domains,直连
  - RULE-SET,my_proxy_domains,🚀 默认代理
  - RULE-SET,my_reject_domains,REJECT

  #其余的规则
  - RULE-SET,proxylite,🚀 默认代理
  - RULE-SET,ai,♾️ ChatGPT
  - RULE-SET,github_domain,♾️ GitHub
  - RULE-SET,youtube_domain,♾️ YouTube
  - RULE-SET,google_domain,♾️ Google
  - RULE-SET,onedrive_domain,♾️ OneDrive
  - RULE-SET,microsoft_domain,♾️ Microsoft
  - RULE-SET,apple_domain,直连
  - RULE-SET,telegram_domain,♾️ Telegram
  - RULE-SET,apple_ip,直连
  - RULE-SET,google_ip,♾️ Google
  - RULE-SET,telegram_ip,♾️ Telegram
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  - MATCH,🐟 漏网之鱼


#######规则集#############################################
